name = "armvet-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database (Cloudflare's serverless SQLite) ────────────────────────────
# Create with: wrangler d1 create armvet-db
# Then paste the database_id below.
[[d1_databases]]
binding = "DB"
database_name = "armvet-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# ─── R2 Object Storage (for logo / media uploads) ────────────────────────────
# Create with: wrangler r2 bucket create armvet-media
[[r2_buckets]]
binding = "R2"
bucket_name = "armvet-media"

# ─── KV Namespace (for JWT secret cache + rate limiting) ─────────────────────
# Create with: wrangler kv namespace create armvet-kv
# Then paste the id below.
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# ─── Plaintext vars (non-secret) ─────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"

# ─── Secrets (never put values here — set via `wrangler secret put`) ─────────
# wrangler secret put ADMIN_USERNAME
# wrangler secret put ADMIN_PASSWORD

# ─── Local dev overrides ──────────────────────────────────────────────────────
[dev]
port = 8787

# Bindings used only when running `wrangler dev`
[[env.development.d1_databases]]
binding = "DB"
database_name = "armvet-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[env.development.r2_buckets]]
binding = "R2"
bucket_name = "armvet-media"
preview_bucket_name = "armvet-media-preview"

[[env.development.kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

[env.development.vars]
ENVIRONMENT = "development"
ADMIN_USERNAME = "admin"
ADMIN_PASSWORD = "changeme"
