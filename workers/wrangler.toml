name = "armvet-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database ─────────────────────────────────────────────────────────────
# database_id is injected at deploy time from the CF_D1_DATABASE_ID GitHub secret
[[d1_databases]]
binding = "DB"
database_name = "armvet-db"
database_id = "CF_D1_DATABASE_ID"

# ─── R2 Object Storage ───────────────────────────────────────────────────────
# No ID needed — just the bucket name
[[r2_buckets]]
binding = "R2"
bucket_name = "armvet-media"

# ─── KV Namespace ────────────────────────────────────────────────────────────
# id is injected at deploy time from the CF_KV_NAMESPACE_ID GitHub secret
[[kv_namespaces]]
binding = "KV"
id = "CF_KV_NAMESPACE_ID"

# ─── Plaintext vars ───────────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"

# ─── Secrets set via Cloudflare dashboard after first deploy ─────────────────
# Workers & Pages → armvet-api → Settings → Variables and Secrets
# Add: ADMIN_USERNAME, ADMIN_PASSWORD
