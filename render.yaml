databases:
  - name: armvet-db
    databaseName: armvet
    user: armvet
    plan: free

services:
  - type: web
    name: armvet-admin
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: armvet-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
